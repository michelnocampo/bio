<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michel no Campo | Links</title>

    <!-- Importação da Fonte Poppins (Limpa e Moderna) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Importação dos Ícones (FontAwesome) para as Redes Sociais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           ÁREA DE CONFIGURAÇÃO DE CORES (FÁCIL EDIÇÃO)
           ========================================================================== */
        :root {
            var(--cor-fundo-topo): #E8F5E9;
            --cor-fundo-topo: #E8F5E9;   
            --cor-fundo-base: #D7CCC8;   
            --cor-texto-nome: #2E3B22;   
            --cor-texto-bio: #4E342E;    
            --cor-btn-fundo: rgba(255, 255, 255, 0.6); 
            --cor-btn-borda: #81C784;    
            --cor-btn-texto: #2E3B22;    
            --cor-btn-hover-fundo: #558B2F; 
            --cor-btn-hover-texto: #FFFFFF; 
            --cor-btn-hover-sombra: rgba(85, 139, 47, 0.4);
        }

        /* ==========================================================================
           ESTILOS DO SITE (CSS)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--cor-fundo-topo) 0%, var(--cor-fundo-base) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 2rem 1.5rem; 
        }

        .container {
            width: 100%;
            max-width: 600px; 
            text-align: center;
            padding: 2rem 1rem;
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .perfil-img {
            width: 130px;
            height: 130px;
            border-radius: 50%; 
            object-fit: cover;  
            border: 4px solid var(--cor-btn-borda); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .perfil-img:hover {
            transform: scale(1.05);
        }

        .perfil-nome {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--cor-texto-nome);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .perfil-bio {
            font-size: 0.95rem;
            color: var(--cor-texto-bio);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem; 
        }

        /* ==========================================================================
           CORREÇÃO DOS BOTÕES PARA MOBILE
           ========================================================================== */
        .link-botao {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--cor-btn-fundo);
            color: var(--cor-btn-texto);
            text-decoration: none;
            /* AJUSTE: Padding igual dos lados (3.5rem) para o texto não bater no ícone */
            padding: 1rem 3.5rem; 
            border-radius: 50px; 
            font-weight: 500;
            font-size: 1.05rem;
            border: 2px solid var(--cor-btn-borda);
            backdrop-filter: blur(5px); 
            transition: all 0.3s ease; 
            /* AJUSTE: Centraliza o texto caso quebre para duas linhas */
            text-align: center;
            line-height: 1.3;
        }

        .link-botao i {
            position: absolute;
            left: 1.5rem; 
            /* AJUSTE: Mantém o ícone perfeitamente no centro, independente de quantas linhas o texto tem */
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
        }

        @media (hover: hover) {
            .link-botao:hover {
                background-color: var(--cor-btn-hover-fundo);
                color: var(--cor-btn-hover-texto);
                border-color: var(--cor-btn-hover-fundo);
                transform: translateY(-4px); 
                box-shadow: 0 8px 20px var(--cor-btn-hover-sombra); 
            }
        }

        /* Responsividade */
        @media (max-width: 380px) {
            .link-botao {
                font-size: 0.95rem;
                padding: 0.9rem 3rem; /* Mantém o espaçamento seguro no celular menor */
            }
            .link-botao i {
                left: 1.2rem;
            }
        }

        @media (min-width: 768px) {
            .container {
                background: rgba(255, 255, 255, 0.25);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: 3rem;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.5);
            }

            .link-botao {
                padding: 1.2rem 3.5rem;
                font-size: 1.1rem;
            }
            
            .perfil-bio {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="https://i.postimg.cc/P56v1B0C/minha-foto.jpg" alt="Foto de Michel" class="perfil-img">
        
        <h1 class="perfil-nome">@michelnocampo</h1>
        
        <p class="perfil-bio">
            🌱 Dicas práticas e os melhores equipamentos para te ajudar no campo.<br>
        </p>

        <div class="links-container">

            <!-- Link Mercado Livre (Redireciona para subpágina) -->
            <a href="mercadolivre.html" class="link-botao">
                <i class="fa-solid fa-handshake"></i>
                Indicações no Mercado Livre
            </a>

            <!-- Link E-mail (Substitua seuemail@exemplo.com pelo seu e-mail real) -->
            <a href="mailto:contatomichelnocampo@gmail.com" class="link-botao">
                <i class="fa-solid fa-envelope"></i>
                E-mail de Contato
            </a>
            
            <!-- Link YouTube -->
            <a href="https://www.youtube.com/@michelnocampo?sub_confirmation=1" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-youtube"></i>
                YouTube
            </a>

            <!-- Link Instagram -->
            <a href="https://www.instagram.com/michelnocampo/" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <!-- Link TikTok -->
            <a href="https://www.tiktok.com/@michelnocampo?_r=1&_t=ZS-95wrVCIJB6V" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-tiktok"></i>
                TikTok
            </a>

            <!-- Link Facebook -->
            <a href="https://www.facebook.com/michelnocampo" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-facebook-f"></i>
                Facebook
            </a>

        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michel no Campo | Links</title>

    <!-- Importação da Fonte Poppins (Limpa e Moderna) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Importação dos Ícones (FontAwesome) para as Redes Sociais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           ÁREA DE CONFIGURAÇÃO DE CORES (FÁCIL EDIÇÃO)
           Altere os códigos HEX (#...) abaixo para mudar as cores do site.
           ========================================================================== */
        :root {
            /* Fundo da página (Gradiente de verde claro para marrom terra claro) */
            --cor-fundo-topo: #E8F5E9;   /* Verde folha bem suave */
            --cor-fundo-base: #D7CCC8;   /* Marrom/Areia suave */

            /* Cores dos Textos */
            --cor-texto-nome: #2E3B22;   /* Verde musgo muito escuro */
            --cor-texto-bio: #4E342E;    /* Marrom terra */

            /* Cores dos Botões (Estado normal) */
            --cor-btn-fundo: rgba(255, 255, 255, 0.6); /* Branco levemente transparente */
            --cor-btn-borda: #81C784;    /* Verde natureza claro */
            --cor-btn-texto: #2E3B22;    /* Verde musgo escuro */

            /* Cores dos Botões (Quando passa o mouse por cima - Hover) */
            --cor-btn-hover-fundo: #558B2F; /* Verde folha escuro e rústico */
            --cor-btn-hover-texto: #FFFFFF; /* Branco */
            --cor-btn-hover-sombra: rgba(85, 139, 47, 0.4);
        }

        /* ==========================================================================
           ESTILOS DO SITE (CSS)
           ========================================================================== */
        
        /* Reset básico para manter tudo alinhado */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            /* Fundo com gradiente suave */
            background: linear-gradient(135deg, var(--cor-fundo-topo) 0%, var(--cor-fundo-base) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Centraliza no meio da tela no PC */
            padding: 2rem 1.5rem; /* Ajustado para mobile */
        }

        /* Container principal que centraliza o conteúdo */
        .container {
            width: 100%;
            max-width: 600px; /* Alargado um pouco para acomodar bem no PC */
            text-align: center;
            padding: 2rem 1rem;
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        /* Estilo da Foto de Perfil */
        .perfil-img {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Deixa a foto redonda */
            object-fit: cover;  /* Evita que a foto fique esticada */
            border: 4px solid var(--cor-btn-borda); /* Borda sutil */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* Sombra leve */
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        /* Efeito ao passar o mouse na foto */
        .perfil-img:hover {
            transform: scale(1.05);
        }

        /* Estilo do Nome (@) */
        .perfil-nome {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--cor-texto-nome);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        /* Estilo da Biografia */
        .perfil-bio {
            font-size: 0.95rem;
            color: var(--cor-texto-bio);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Organização dos Links */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem; /* Espaço entre um botão e outro */
        }

        /* Estilo dos Botões de Link */
        .link-botao {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--cor-btn-fundo);
            color: var(--cor-btn-texto);
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px; /* Bordas bem arredondadas */
            font-weight: 500;
            font-size: 1.05rem;
            border: 2px solid var(--cor-btn-borda);
            backdrop-filter: blur(5px); /* Dá um leve efeito de vidro fosco no fundo */
            transition: all 0.3s ease; /* Transição suave para o hover */
        }

        /* Estilo do Ícone dentro do botão */
        .link-botao i {
            position: absolute;
            left: 1.5rem; /* Posiciona o ícone à esquerda */
            font-size: 1.4rem;
        }

        /* Garante que o EFEITO HOVER só funcione em aparelhos com Mouse (PCs), 
           evitando bugs visuais no touch do celular */
        @media (hover: hover) {
            .link-botao:hover {
                background-color: var(--cor-btn-hover-fundo);
                color: var(--cor-btn-hover-texto);
                border-color: var(--cor-btn-hover-fundo);
                transform: translateY(-4px); /* Botão sobe um pouquinho */
                box-shadow: 0 8px 20px var(--cor-btn-hover-sombra); /* Ganha uma sombra rústica */
            }
        }

        /* ==========================================================================
           RESPONSIVIDADE (Celulares pequenos, Tablets e PCs)
           ========================================================================== */

        /* Responsividade extra para celulares muito pequenos */
        @media (max-width: 380px) {
            .link-botao {
                font-size: 0.95rem;
                padding: 0.9rem 1.5rem;
            }
            .link-botao i {
                left: 1.2rem;
            }
        }

        /* Responsividade para Tablets e PCs (Telas médias e grandes) */
        @media (min-width: 768px) {
            .container {
                /* No PC/Tablet, o site vira um "cartão" de vidro (Glassmorphism) */
                background: rgba(255, 255, 255, 0.25);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                padding: 3rem;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.5);
            }

            /* Deixa os botões um pouco mais robustos no PC */
            .link-botao {
                padding: 1.2rem 2rem;
                font-size: 1.1rem;
            }
            
            /* Aumenta levemente a fonte do texto da bio no PC */
            .perfil-bio {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ==========================================
             1. FOTO DE PERFIL
             Substitua o link de src="" pelo link ou caminho da sua foto real.
             ========================================== -->
        <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=80" alt="Foto de Michel" class="perfil-img">
        <!-- Dica: Você pode usar uma imagem local assim: src="minha-foto.jpg" -->

        <!-- ==========================================
             2. NOME DO PERFIL E BIO
             ========================================== -->
        <h1 class="perfil-nome">@michelnocampo</h1>
        
        <p class="perfil-bio">
            🌱 Construindo uma vida no campo<br>
            🎥 Compartilhando o que estou aprendendo<br>
            🌾 Animais • Horta • Frutíferas
        </p>

        <!-- ==========================================
             3. BOTÕES DE LINKS (REDES SOCIAIS)
             Substitua o "#" em href="#" pelo link real do seu perfil.
             ========================================== -->
        <div class="links-container">
            
            <!-- Link YouTube -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-youtube"></i>
                YouTube
            </a>

            <!-- Link Instagram -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <!-- Link TikTok -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-tiktok"></i>
                TikTok
            </a>

            <!-- Link Facebook -->
            <a href="#" target="_blank" rel="noopener noreferrer" class="link-botao">
                <i class="fa-brands fa-facebook-f"></i>
                Facebook
            </a>

        </div>

    </div>

</body>
</html>
